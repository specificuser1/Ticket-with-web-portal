<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket System Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .login-container, .dashboard-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .login-container {
            max-width: 400px;
            margin: 100px auto;
        }
        
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }
        
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 48px;
            font-weight: bold;
        }
        
        .stat-label {
            margin-top: 10px;
            font-size: 14px;
            opacity: 0.9;
        }
        
        .tickets-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .tickets-table th,
        .tickets-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .tickets-table th {
            background: #f5f5f5;
            font-weight: 600;
        }
        
        .status-open {
            color: #4caf50;
            font-weight: bold;
        }
        
        .status-closed {
            color: #f44336;
            font-weight: bold;
        }
        
        .error {
            color: #f44336;
            text-align: center;
            margin-top: 10px;
        }
        
        .logout-btn {
            background: #f44336;
            margin-bottom: 20px;
            width: auto;
            padding: 10px 20px;
            float: right;
        }
        
        .config-section {
            margin-top: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
        }
        
        .config-input {
            margin: 10px 0;
        }
        
        .config-input label {
            display: inline-block;
            width: 150px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container" id="loginContainer">
        <div class="login-container">
            <h1>🎫 Ticket System Login</h1>
            <form id="loginForm">
                <input type="password" id="password" placeholder="Enter Admin Password" required>
                <button type="submit">Login</button>
            </form>
            <div id="loginError" class="error"></div>
        </div>
    </div>
    
    <div class="container" id="dashboardContainer" style="display: none;">
        <div class="dashboard-container">
            <button class="logout-btn" onclick="logout()">Logout</button>
            <h1>🎫 Ticket System Dashboard</h1>
            
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-number" id="totalTickets">0</div>
                    <div class="stat-label">Total Tickets</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="openTickets">0</div>
                    <div class="stat-label">Open Tickets</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="closedTickets">0</div>
                    <div class="stat-label">Closed Tickets</div>
                </div>
            </div>
            
            <h2>Recent Tickets</h2>
            <table class="tickets-table" id="ticketsTable">
                <thead>
                    <tr>
                        <th>Ticket ID</th>
                        <th>User ID</th>
                        <th>Topic</th>
                        <th>Status</th>
                        <th>Created</th>
                    </tr>
                </thead>
                <tbody id="ticketsBody"></tbody>
            </table>
            
            <div class="config-section">
                <h3>Configuration</h3>
                <div class="config-input">
                    <label>Support Role ID:</label>
                    <input type="text" id="supportRoleId" placeholder="Role ID">
                </div>
                <div class="config-input">
                    <label>Log Channel ID:</label>
                    <input type="text" id="logChannelId" placeholder="Channel ID">
                </div>
                <button onclick="updateConfig()">Update Configuration</button>
            </div>
        </div>
    </div>
    
    <script>
        let isLoggedIn = false;
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            
            const response = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `password=${encodeURIComponent(password)}`
            });
            
            const result = await response.json();
            
            if (result.success) {
                isLoggedIn = true;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboardContainer').style.display = 'block';
                loadDashboard();
                setInterval(loadDashboard, 30000); // Refresh every 30 seconds
            } else {
                document.getElementById('loginError').textContent = 'Invalid password!';
            }
        });
        
        async function loadDashboard() {
            if (!isLoggedIn) return;
            
            try {
                // Load stats
                const statsResponse = await fetch('/api/stats');
                const stats = await statsResponse.json();
                document.getElementById('totalTickets').textContent = stats.total;
                document.getElementById('openTickets').textContent = stats.open;
                document.getElementById('closedTickets').textContent = stats.closed;
                
                // Load tickets
                const ticketsResponse = await fetch('/api/tickets');
                const tickets = await ticketsResponse.json();
                
                const tbody = document.getElementById('ticketsBody');
                tbody.innerHTML = '';
                
                Object.entries(tickets).slice(0, 20).forEach(([id, ticket]) => {
                    const row = tbody.insertRow();
                    row.insertCell(0).textContent = id;
                    row.insertCell(1).textContent = ticket.user_id;
                    row.insertCell(2).textContent = ticket.topic;
                    row.insertCell(3).innerHTML = `<span class="status-${ticket.status}">${ticket.status.toUpperCase()}</span>`;
                    row.insertCell(4).textContent = new Date(parseFloat(ticket.created_at) * 1000).toLocaleString();
                });
                
                // Load config
                const configResponse = await fetch('/api/config');
                const config = await configResponse.json();
                document.getElementById('supportRoleId').value = config.support_role_id || '';
                document.getElementById('logChannelId').value = config.log_channel_id || '';
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        async function updateConfig() {
            const config = {
                support_role_id: document.getElementById('supportRoleId').value,
                log_channel_id: document.getElementById('logChannelId').value
            };
            
            const response = await fetch('/api/config', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(config)
            });
            
            if (response.ok) {
                alert('Configuration updated successfully!');
            } else {
                alert('Failed to update configuration!');
            }
        }
        
        function logout() {
            isLoggedIn = false;
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('dashboardContainer').style.display = 'none';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
