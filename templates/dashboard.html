<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket System Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 260px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            padding: 20px;
        }
        
        .sidebar h2 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }
        
        .sidebar nav a {
            display: block;
            padding: 12px 20px;
            margin: 5px 0;
            color: #333;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .sidebar nav a:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .main-content {
            margin-left: 260px;
            padding: 30px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-value {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-label {
            color: #666;
            margin-top: 10px;
            font-size: 14px;
        }
        
        .ticket-list {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .ticket-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .ticket-item:hover {
            background: #f5f5f5;
        }
        
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-open { background: #4caf50; color: white; }
        .status-closed { background: #f44336; color: white; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        canvas {
            max-height: 300px;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div id="loginContainer" class="login-container">
        <h1>🎫 Ticket System Login</h1>
        <input type="password" id="password" placeholder="Admin Password">
        <button onclick="login()">Login</button>
        <div id="loginError" style="color: red; margin-top: 10px;"></div>
    </div>
    
    <div id="app" style="display: none;">
        <div class="sidebar">
            <h2>🎫 Ticket System</h2>
            <nav>
                <a onclick="showPage('dashboard')">Dashboard</a>
                <a onclick="openPanelBuilder()">Panel Builder</a>
                <a onclick="openSettings()">Settings</a>
                <a onclick="logout()">Logout</a>
            </nav>
        </div>
        
        <div class="main-content">
            <div id="dashboardPage">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="totalTickets">0</div>
                        <div class="stat-label">Total Tickets</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="openTickets">0</div>
                        <div class="stat-label">Open Tickets</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="closedTickets">0</div>
                        <div class="stat-label">Closed Tickets</div>
                    </div>
                </div>
                
                <div class="ticket-list">
                    <h2>Recent Tickets</h2>
                    <canvas id="ticketsChart"></canvas>
                    <div id="ticketsList"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="ticketModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Ticket Details</h2>
            <div id="modalContent"></div>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>
    
    <script>
        let isLoggedIn = false;
        let chart = null;
        
        function openPanelBuilder() {
            window.location.href = '/panel-builder';
        }
        
        function openSettings() {
            window.location.href = '/settings';
        }
        
        async function login() {
            const password = document.getElementById('password').value;
            
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password })
            });
            
            const data = await response.json();
            
            if (data.success) {
                isLoggedIn = true;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                loadDashboard();
                setInterval(loadDashboard, 30000);
            } else {
                document.getElementById('loginError').textContent = 'Invalid password!';
            }
        }
        
        async function loadDashboard() {
            if (!isLoggedIn) return;
            
            try {
                const statsRes = await fetch('/api/stats');
                const stats = await statsRes.json();
                
                document.getElementById('totalTickets').textContent = stats.total;
                document.getElementById('openTickets').textContent = stats.open;
                document.getElementById('closedTickets').textContent = stats.closed;
                
                if (chart) {
                    chart.data.datasets[0].data = [stats.open, stats.closed];
                    chart.update();
                }
                
                const ticketsRes = await fetch('/api/tickets');
                const tickets = await ticketsRes.json();
                
                const ticketsList = document.getElementById('ticketsList');
                ticketsList.innerHTML = '<h3>Ticket History</h3>';
                
                const ticketsArray = Object.entries(tickets).slice(0, 20);
                if (ticketsArray.length === 0) {
                    ticketsList.innerHTML += '<p>No tickets found.</p>';
                } else {
                    ticketsArray.forEach(([id, ticket]) => {
                        const ticketDiv = document.createElement('div');
                        ticketDiv.className = 'ticket-item';
                        ticketDiv.onclick = () => showTicketDetails(id, ticket);
                        ticketDiv.innerHTML = `
                            <strong>${id}</strong><br>
                            User: <code>${ticket.user_id}</code><br>
                            Topic: ${ticket.topic}<br>
                            Status: <span class="status status-${ticket.status}">${ticket.status.toUpperCase()}</span><br>
                            Created: ${new Date(ticket.created_at).toLocaleString()}
                        `;
                        ticketsList.appendChild(ticketDiv);
                    });
                }
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        function showTicketDetails(id, ticket) {
            document.getElementById('modalTitle').textContent = `Ticket: ${id}`;
            let content = `
                <p><strong>User ID:</strong> ${ticket.user_id}</p>
                <p><strong>Topic:</strong> ${ticket.topic}</p>
                <p><strong>Status:</strong> ${ticket.status}</p>
                <p><strong>Created:</strong> ${new Date(ticket.created_at).toLocaleString()}</p>
            `;
            if (ticket.closed_at) {
                content += `<p><strong>Closed:</strong> ${new Date(ticket.closed_at).toLocaleString()}</p>`;
            }
            if (ticket.transcript) {
                content += `<details><summary>View Transcript</summary><pre>${JSON.stringify(ticket.transcript, null, 2)}</pre></details>`;
            }
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('ticketModal').style.display = 'flex';
        }
        
        function closeModal() {
            document.getElementById('ticketModal').style.display = 'none';
        }
        
        function showPage(page) {
            // Handle page navigation
        }
        
        function logout() {
            isLoggedIn = false;
            document.getElementById('app').style.display = 'none';
            document.getElementById('loginContainer').style.display = 'block';
            document.getElementById('password').value = '';
        }
        
        // Initialize chart
        const ctx = document.getElementById('ticketsChart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Open Tickets', 'Closed Tickets'],
                datasets: [{
                    data: [0, 0],
                    backgroundColor: ['#4caf50', '#f44336']
                }]
            }
        });
    </script>
</body>
</html>
